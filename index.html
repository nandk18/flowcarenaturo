    <script>
      // Create the correct manifest + install metadata BEFORE React mounts so
      // Chrome/Safari never see the admin manifest first on therapist routes.
      (function () {
        try {
          var p = window.location.pathname || "";
          var isTherapist =
            p.indexOf("/therapist-login") === 0 ||
            p.indexOf("/therapist-app") === 0 ||
            p.indexOf("/therapist") === 0 ||
            p.indexOf("/treatment/therapist") === 0;
          var manifestHref = isTherapist
            ? "/manifest-therapist.webmanifest?v=therapist-2"
            : "/manifest-admin.webmanifest?v=admin-2";
          var title = isTherapist ? "FlowCare Therapist" : "FlowCare";
          var appleIcon = isTherapist ? "/therapist-apple-touch.png" : "/apple-touch-icon.png";
          var icon192 = isTherapist ? "/therapist-icon-192.png" : "/flowcare-icon-192.png";
          var icon512 = isTherapist ? "/therapist-icon-512.png" : "/flowcare-icon-512.png";

          var m = document.createElement("link");
          m.rel = "manifest";
          m.href = manifestHref;
          document.head.appendChild(m);

          var a = document.querySelector('link[rel="apple-touch-icon"]');
          if (a) a.setAttribute("href", appleIcon);
          var icons = document.querySelectorAll('link[rel="icon"][sizes]');
          for (var i = 0; i < icons.length; i++) {
            var sizes = icons[i].getAttribute("sizes");
            if (sizes === "192x192") icons[i].setAttribute("href", icon192);
            if (sizes === "512x512") icons[i].setAttribute("href", icon512);
          }
          var t = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (t) t.setAttribute("content", title);
          document.title = title;
        } catch (e) {}
      })();
    </script>

    <script>
      // Android Chrome: real viewport height (100vh includes URL bar)
      (function () {
        function setVH() {
          var vh = window.innerHeight * 0.01;
          document.documentElement.style.setProperty('--vh', vh + 'px');
        }
        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
      })();
    </script>
