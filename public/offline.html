<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>You're offline — FlowCare</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#0f766e" />
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
        background: linear-gradient(180deg, #f5f5f5 0%, #e6fffb 100%);
        color: #0f172a;
        display: flex; align-items: center; justify-content: center;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        -webkit-user-select: none; user-select: none;
      }
      .card { text-align: center; max-width: 340px; padding: 32px; }
      .logo { width: 88px; height: 88px; margin: 0 auto 20px; border-radius: 20px; box-shadow: 0 10px 30px -12px rgba(15,118,110,.35); }
      h1 { font-size: 22px; margin: 0 0 8px; color: #0f766e; }
      p { font-size: 15px; line-height: 1.5; color: #475569; margin: 0 0 24px; }
      button {
        appearance: none; border: 0; background: #0f766e; color: #fff; font-weight: 600;
        padding: 14px 24px; border-radius: 12px; font-size: 15px; min-height: 44px; cursor: pointer;
      }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/flowcare-icon-192.png" alt="FlowCare" />
      <h1>You're offline</h1>
      <p>Check your connection and try again. Any unsaved work is preserved.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
